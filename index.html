<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspa & Gana Pro v3.1</title>
<style>
/* --- Reset y estilo base --- */
body {
  margin:0; font-family: Arial, sans-serif;
  background:#0b0f1a; color:white; overflow-x:hidden;
}
.container {padding:20px; text-align:center;}
input {padding:12px; border-radius:10px; border:none; width:80%; margin:10px 0;}
button {
  padding:12px 20px; border:none; border-radius:10px;
  background:#00ffcc; color:black; font-weight:bold;
  cursor:pointer; margin:5px; transition: all 0.3s;
}
button:hover {transform: scale(1.05);}
.hidden { display:none; }
.card {background:#121a2a; padding:20px; border-radius:15px; margin:10px 0;}
/* --- Modal tickets --- */
#ticketsModal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  backdrop-filter:blur(10px); display:none; justify-content:center; align-items:center;
  flex-direction:column; transition: all 0.5s;
}
.tickets-box {
  background:#1a2338; padding:20px; border-radius:15px;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.ticket {
  width:60px; height:60px; background:#00ffcc;
  margin:5px; display:inline-flex; align-items:center; justify-content:center;
  border-radius:10px; cursor:pointer; font-weight:bold; transition: all 0.3s;
  box-shadow:0 0 5px #00ffcc;
}
.ticket:hover {
  transform: scale(1.4) rotate(-5deg);
  box-shadow:0 0 15px #00ffcc,0 0 20px #00ffcc inset;
}
/* --- Raspeo --- */
#scratchContainer {
  position:fixed; top:0; left:0; width:100%; height:100%;
  backdrop-filter:blur(10px); display:none; justify-content:center; align-items:center; flex-direction:column;
}
canvas {background:gray; border-radius:10px; touch-action:none;}
/* --- Notificaciones --- */
.notification {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#00ffcc; color:black; padding:10px 20px; border-radius:10px; display:none;
  font-weight:bold;
}
/* --- Animación tickets carrusel --- */
.tickets-wrapper {display:flex; transition: transform 0.5s ease;}
</style>
</head>
<body>

<!-- --- Pantalla inicial --- -->
<div class="container" id="start">
<h2>¿QUIÉN JUEGA?</h2>
<input id="nameInput" placeholder="Tu nombre o alias">
<br>
<button onclick="saveName()">Confirmar</button>
</div>

<!-- --- Wallet --- -->
<div class="container hidden" id="wallet">
<h2>Añadir Wallet</h2>
<input id="walletInput" placeholder="Dirección USDT BEP20">
<br>
<button onclick="saveWallet()">Confirmar</button>
</div>

<!-- --- Panel principal --- -->
<div class="container hidden" id="panel">
<h2 id="userName"></h2>
<p id="walletText"></p>

<div class="card">
<p>Para participar debes depositar 1 USDT y validar el hash de la transacción. Cada depósito permite una sola jugada.</p>
</div>

<input id="hashInput" placeholder="Hash de transacción">
<br>
<button onclick="validateHash()">Validar Hash</button>
<br><br>
<button onclick="openTickets()">Participar</button>
<button onclick="showPremios()">Lista de premios</button>
<h3 id="megaBote"></h3>
</div>

<!-- --- Modal Tickets --- -->
<div id="ticketsModal">
<div class="tickets-box">
<button onclick="prev()">⬅️</button>
<div id="tickets" class="tickets-wrapper"></div>
<button onclick="next()">➡️</button>
</div>
</div>

<!-- --- Raspeo --- -->
<div id="scratchContainer">
<h3 id="resultText"></h3>
<canvas id="canvas" width="300" height="150"></canvas>
</div>

<!-- --- Notificaciones --- -->
<div class="notification" id="notif"></div>

<script>
// --- Variables Globales ---
let page=0;
let usedHashes = JSON.parse(localStorage.getItem("usedHashes")||"[]");

// --- Notificaciones ---
function notify(msg){
  let n=document.getElementById("notif");
  n.innerText=msg; n.style.display="block";
  setTimeout(()=>n.style.display="none",3000);
}

// --- Nombre de usuario ---
function saveName(){
  let name=document.getElementById("nameInput").value.trim();
  if(!name) return notify("Introduce un nombre");
  localStorage.setItem("name",name);
  document.getElementById("start").classList.add("hidden");
  document.getElementById("wallet").classList.remove("hidden");
}

// --- Wallet ---
function saveWallet(){
  let w=document.getElementById("walletInput").value.trim();
  if(!w.startsWith("0x")||w.length!==42) return notify("Dirección incorrecta");
  localStorage.setItem("wallet",w);
  loadPanel();
}

// --- Panel Principal ---
function loadPanel(){
  document.getElementById("wallet").classList.add("hidden");
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("userName").innerText="Bienvenido: "+localStorage.getItem("name");
  document.getElementById("walletText").innerText="Wallet: "+localStorage.getItem("wallet");
  calcMega();
}

// --- Validar Hash ---
function validateHash(){
  let h=document.getElementById("hashInput").value.trim();
  if(!/^0x[a-fA-F0-9]{64}$/.test(h)) return notify("Hash inválido para BEP20 USDT");
  if(usedHashes.includes(h)) return notify("Este hash ya fue utilizado");
  localStorage.setItem("paid","yes");
  localStorage.setItem("jugado","no");
  usedHashes.push(h);
  localStorage.setItem("usedHashes",JSON.stringify(usedHashes));
  notify("Depósito confirmado, listo para jugar");
}

// --- Abrir Tickets ---
function openTickets(){
  if(localStorage.getItem("paid")!=="yes") return notify("Debes validar el pago");
  if(localStorage.getItem("jugado")==="yes") return notify("Ya usaste este depósito");
  document.getElementById("ticketsModal").style.display="flex";
  renderTickets();
}

// --- Render Tickets ---
function renderTickets(){
  let container=document.getElementById("tickets");
  container.innerHTML="";
  let start=page*10;
  for(let i=start;i<start+10;i++){
    let t=document.createElement("div");
    t.className="ticket"; t.innerText=i+1;
    t.onclick=()=>selectTicket(i);
    container.appendChild(t);
  }
}

// --- Carrusel ---
function next(){if(page<1){page++; renderTickets();}}
function prev(){if(page>0){page--; renderTickets();}}

// --- Selección Ticket ---
function selectTicket(i){
  document.getElementById("ticketsModal").style.display="none";
  document.getElementById("scratchContainer").style.display="flex";
  document.getElementById("resultText").innerText="Raspa para descubrir";
  startScratch();
}

// --- Raspeo ---
function startScratch(){
  let premios=[0,0.5,1,5];
  let premio=premios[Math.floor(Math.random()*premios.length)];
  let canvas=document.getElementById("canvas");
  let ctx=canvas.getContext("2d");
  ctx.fillStyle="gray"; ctx.fillRect(0,0,canvas.width,canvas.height);
  let drawing=false;
  canvas.onpointerdown=()=>drawing=true;
  canvas.onpointerup=()=>drawing=false;
  canvas.onpointermove=(e)=>{
    if(!drawing) return;
    ctx.globalCompositeOperation="destination-out";
    ctx.beginPath();
    let rect=canvas.getBoundingClientRect();
    let x=e.clientX-rect.left, y=e.clientY-rect.top;
    ctx.arc(x,y,15,0,2*Math.PI);
    ctx.fill();
  }
  setTimeout(()=>{
    document.getElementById("resultText").innerText = premio>0 ? "¡Ganaste "+premio+" USDT 🎉!" : "No ganaste";
    localStorage.setItem("jugado","yes");
    localStorage.setItem("resultado",premio);
    localStorage.setItem("paid","no");
  },3000);
}

// --- MEGA BOTE ---
function calcMega(){
  let startDate=new Date("2026-04-09");
  let now=new Date();
  let days=Math.floor((now-startDate)/(1000*60*60*24));
  let value=492+(days*80);
  document.getElementById("megaBote").innerText="MEGA BOTE: "+value+" USDT";
}

// --- Lista Premios ---
function showPremios(){notify("Premios: 25,50,75,100,150,250,350 + MEGA BOTE");}

// --- OnLoad ---
window.onload=()=>{
  if(localStorage.getItem("name")){
    if(localStorage.getItem("wallet")) loadPanel();
    else {document.getElementById("start").classList.add("hidden"); document.getElementById("wallet").classList.remove("hidden");}
  }
}
</script>
</body>
</html>
