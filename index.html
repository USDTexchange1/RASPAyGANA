<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspa & Gana Pro</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f0f0; display:flex; flex-direction:column; align-items:center; }
  #screen { max-width:600px; width:100%; margin-top:20px; text-align:center; }
  input { padding:10px; margin:10px 0; width:80%; border-radius:5px; border:1px solid #ccc; }
  button { padding:10px 20px; margin:10px; border:none; border-radius:5px; background:linear-gradient(45deg,#4caf50,#81c784); color:white; cursor:pointer; transition:all 0.3s; }
  button:hover { transform:scale(1.05); }
  #ticketsModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; max-width:800px; background:white; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.3); padding:20px; }
  .carousel { display:flex; overflow-x:auto; gap:10px; }
  .ticket { min-width:100px; height:150px; background:linear-gradient(135deg,#ffeb3b,#ffc107); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:bold; cursor:pointer; transition:all 0.5s; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
  .ticket:hover { transform:scale(1.1) rotate(2deg); }
  #canvasContainer { display:none; margin-top:20px; position:relative; }
  canvas { border-radius:10px; background:#ccc; touch-action:none; }
  #recibirBtn { display:none; padding:10px 20px; background:#ff5722; color:white; border:none; border-radius:5px; cursor:pointer; position:absolute; bottom:10px; left:50%; transform:translateX(-50%); }
  #loader { display:none; border:6px solid #f3f3f3; border-top:6px solid #3498db; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin:20px auto; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  #notification { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:5px; display:none; }
</style>
</head>
<body>
<div id="screen">
  <h1>Raspa & Gana Pro</h1>
  <input type="text" id="nameInput" placeholder="Ingresa tu nombre o alias">
  <input type="text" id="walletInput" placeholder="Ingresa tu wallet USDT BEP20">
  <button id="participarBtn">Participar</button>
  <div id="megaBote">MEGA BOTE: <span id="megaBoteValue">Calculando...</span> USDT</div>
</div>

<div id="ticketsModal">
  <h2>Selecciona tu ticket</h2>
  <div class="carousel" id="carouselTickets"></div>
</div>

<div id="canvasContainer">
  <canvas id="scratchCanvas" width="400" height="200"></canvas>
  <button id="recibirBtn">Recibir premio</button>
</div>

<div id="loader"></div>
<div id="notification"></div>

<script>
const megaBoteBase = 492;
const megaBoteStart = new Date("2026-04-09");
const tickets = [25,10,55,250,100,160,390,'MEGA BOTE'];
let selectedTicket = null;

function updateMegaBote() {
  const days = Math.floor((new Date() - megaBoteStart)/86400000);
  document.getElementById('megaBoteValue').innerText = megaBoteBase + days*80;
}

updateMegaBote();
setInterval(updateMegaBote, 60000);

function showNotification(msg, duration=3000){
  const notif = document.getElementById('notification');
  notif.innerText = msg;
  notif.style.display='block';
  setTimeout(()=>notif.style.display='none', duration);
}

const nameInput = document.getElementById('nameInput');
const walletInput = document.getElementById('walletInput');
const participarBtn = document.getElementById('participarBtn');
const ticketsModal = document.getElementById('ticketsModal');
const carousel = document.getElementById('carouselTickets');
const canvasContainer = document.getElementById('canvasContainer');
const canvas = document.getElementById('scratchCanvas');
const recibirBtn = document.getElementById('recibirBtn');
const loader = document.getElementById('loader');
const ctx = canvas.getContext('2d');

if(localStorage.getItem('username')) nameInput.value = localStorage.getItem('username');
if(localStorage.getItem('wallet')) walletInput.value = localStorage.getItem('wallet');

nameInput.addEventListener('input', ()=>localStorage.setItem('username', nameInput.value));
walletInput.addEventListener('input', ()=>{
  const val = walletInput.value;
  if(val.startsWith('0x') && val.length===42){
    localStorage.setItem('wallet', val);
  }
});

participarBtn.addEventListener('click', ()=>{
  const name = nameInput.value.trim();
  const wallet = walletInput.value.trim();
  if(!name || !wallet){ showNotification("Debes ingresar nombre y wallet"); return; }
  if(!wallet.startsWith('0x') || wallet.length!==42){ showNotification("Wallet inválida"); return; }
  
  // Simular validación de depósito y hash
  if(!localStorage.getItem('depositValidated')) localStorage.setItem('depositValidated', 'true');
  
  ticketsModal.style.display='block';
  carousel.innerHTML='';
  tickets.forEach((t,i)=>{
    const div = document.createElement('div');
    div.className='ticket';
    div.innerText = `Ticket ${i+1}`;
    div.addEventListener('click', ()=>selectTicket(t,div));
    carousel.appendChild(div);
  });
});

function selectTicket(t,div){
  selectedTicket = t;
  div.style.transform='scale(1.8)';
  showNotification("Raspe su ticket para descubrir el premio",2000);
  setTimeout(()=>{ div.style.transform='scale(1)'; ticketsModal.style.display='none'; openCanvas(); },2000);
}

function openCanvas(){
  canvasContainer.style.display='block';
  ctx.fillStyle='#999';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let scratching = false;
  canvas.addEventListener('pointerdown', ()=>scratching=true);
  canvas.addEventListener('pointerup', ()=>scratching=false);
  canvas.addEventListener('pointermove', (e)=>{
    if(!scratching) return;
    const rect = canvas.getBoundingClientRect();
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();
    ctx.arc(e.clientX-rect.left,e.clientY-rect.top,15,0,2*Math.PI);
    ctx.fill();
    ctx.closePath();
    checkScratch();
  });
}

function checkScratch(){
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let cleared=0;
  for(let i=0;i<imgData.data.length;i+=4) if(imgData.data[i+3]<128) cleared++;
  const percent = cleared/(canvas.width*canvas.height)*100;
  if(percent>80) recibirBtn.style.display='block';
}

recibirBtn.addEventListener('click', ()=>{
  recibirBtn.style.display='none';
  loader.style.display='block';
  setTimeout(()=>{
    loader.style.display='none';
    canvasContainer.style.display='none';
    if(selectedTicket==='MEGA BOTE') selectedTicket=document.getElementById('megaBoteValue').innerText;
    showNotification(selectedTicket ? `Depósito confirmado en su cuenta, revise sus fondos, ¡felicidades!` : "Lo siento, no tuviste suerte 😢");
  },5000);
});
</script>
</body>
</html>
