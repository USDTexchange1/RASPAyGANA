<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raspa & Gana Pro</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f2f5; margin:0; padding:0; display:flex; flex-direction:column; align-items:center; }
  .screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; width:100%; }
  .active { display:flex; }
  input { padding:10px; font-size:1rem; margin:10px 0; border-radius:5px; border:1px solid #ccc; width:250px; }
  button { padding:10px 20px; font-size:1rem; border:none; border-radius:5px; background:#007bff; color:white; cursor:pointer; transition:all 0.3s; }
  button:hover { background:#0056b3; transform:scale(1.05); }
  .notification { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:15px 25px; border-radius:10px; opacity:0; transition:opacity 0.5s; z-index:999; }
  .notification.show { opacity:1; }
  #ticketModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal-content { background:#fff; padding:20px; border-radius:15px; width:90%; max-width:1200px; }
  .tickets { display:flex; overflow-x:auto; gap:15px; padding:10px; }
  .ticket { min-width:100px; min-height:150px; background:linear-gradient(135deg,#ffcc00,#ff6600); border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.5rem; cursor:pointer; transition:all 0.5s; }
  .ticket:hover { transform:scale(1.05) rotate(-2deg); }
  #canvasScreen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
  canvas { border-radius:15px; background:#ccc; }
  #receiveBtn { display:none; margin-top:20px; padding:10px 20px; border:none; border-radius:10px; background:#28a745; color:#fff; font-size:1rem; cursor:pointer; transition:all 0.3s; }
  #receiveBtn:hover { transform:scale(1.05); }
  #loader { display:none; border: 6px solid #f3f3f3; border-top: 6px solid #007bff; border-radius: 50%; width:60px; height:60px; animation: spin 5s linear; margin-top:20px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  #megaBote { position:fixed; top:10px; right:10px; background:#ff4081; color:white; padding:10px 15px; border-radius:10px; font-weight:bold; }
</style>
</head>
<body>

<div id="nameScreen" class="screen active">
  <h2>Bienvenido a Raspa & Gana Pro</h2>
  <input type="text" id="username" placeholder="Ingresa tu nombre o alias">
  <button onclick="saveName()">Continuar</button>
</div>

<div id="walletScreen" class="screen">
  <h2>Ingresa tu wallet USDT BEP20</h2>
  <input type="text" id="wallet" placeholder="0x...">
  <button onclick="saveWallet()">Continuar</button>
</div>

<div id="depositScreen" class="screen">
  <h2>Deposita a la dirección:</h2>
  <p style="font-weight:bold;">0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e</p>
  <input type="text" id="txHash" placeholder="Ingresa el hash de tu transacción">
  <button onclick="validateDeposit()">Validar Depósito</button>
  <button id="participateBtn" onclick="openTickets()" disabled>Participar</button>
</div>

<div id="ticketModal">
  <div class="modal-content">
    <h2>Selecciona tu ticket</h2>
    <div class="tickets" id="ticketContainer"></div>
    <button onclick="closeTickets()">Cerrar</button>
  </div>
</div>

<div id="canvasScreen" class="screen">
  <h2>Raspa tu ticket</h2>
  <canvas id="ticketCanvas" width="400" height="300"></canvas>
  <button id="receiveBtn" onclick="receivePrize()">Recibir premio</button>
  <div id="loader"></div>
</div>

<div id="notification" class="notification"></div>
<div id="megaBote">MEGA BOTE: <span id="megaValue"></span> USDT</div>

<script>
  // --- LocalStorage y navegación ---
  const nameScreen = document.getElementById('nameScreen');
  const walletScreen = document.getElementById('walletScreen');
  const depositScreen = document.getElementById('depositScreen');
  const canvasScreen = document.getElementById('canvasScreen');
  const participateBtn = document.getElementById('participateBtn');
  const notification = document.getElementById('notification');
  const megaValue = document.getElementById('megaValue');

  let selectedTicket = null;
  let prizeAmount = 0;

  // --- MEGA BOTE ---
  function updateMegaBote() {
    const base = 492;
    const daily = 80;
    const start = new Date('2026-04-09');
    const today = new Date();
    const days = Math.floor((today - start)/(1000*60*60*24));
    megaValue.textContent = base + (daily * days);
  }
  updateMegaBote();

  function showNotification(msg) {
    notification.textContent = msg;
    notification.classList.add('show');
    setTimeout(()=>{ notification.classList.remove('show'); },3000);
  }

  // --- Nombre ---
  function saveName() {
    const name = document.getElementById('username').value.trim();
    if(!name) { showNotification('Ingrese un nombre válido'); return; }
    localStorage.setItem('username',name);
    nameScreen.classList.remove('active');
    walletScreen.classList.add('active');
  }

  // --- Wallet ---
  function saveWallet() {
    const wallet = document.getElementById('wallet').value.trim();
    if(!/^0x[a-fA-F0-9]{40}$/.test(wallet)) { showNotification('Wallet inválida'); return; }
    localStorage.setItem('wallet',wallet);
    walletScreen.classList.remove('active');
    depositScreen.classList.add('active');
  }

  // --- Deposito ---
  function validateDeposit() {
    const hash = document.getElementById('txHash').value.trim();
    if(!/^[a-fA-F0-9]{64}$/.test(hash)) { showNotification('Hash inválido'); return; }
    let used = JSON.parse(localStorage.getItem('hashes'))||[];
    if(used.includes(hash)) { showNotification('Hash ya usado'); return; }
    used.push(hash);
    localStorage.setItem('hashes',JSON.stringify(used));
    showNotification('Depósito validado');
    participateBtn.disabled = false;
  }

  // --- Tickets ---
  const ticketModal = document.getElementById('ticketModal');
  const ticketContainer = document.getElementById('ticketContainer');

  function openTickets(){
    ticketContainer.innerHTML='';
    for(let i=1;i<=20;i++){
      const t = document.createElement('div');
      t.classList.add('ticket');
      t.textContent=i;
      t.onclick = ()=>selectTicket(t);
      ticketContainer.appendChild(t);
    }
    ticketModal.style.display='flex';
  }

  function closeTickets(){ ticketModal.style.display='none'; }

  function selectTicket(ticket){
    ticket.style.transform='scale(1.8)';
    setTimeout(()=>{
      ticket.style.transform='scale(1)';
      selectedTicket = ticket.textContent;
      ticketModal.style.display='none';
      canvasScreen.classList.add('active');
      initCanvas();
      prizeAmount = [25,10,55,250,100,160,390][Math.floor(Math.random()*7)];
    },2000);
    showNotification('Raspe su ticket para descubrir el premio');
  }

  // --- Canvas raspeo ---
  const canvas = document.getElementById('ticketCanvas');
  const ctx = canvas.getContext('2d');
  let isDrawing=false;

  function initCanvas(){
    ctx.fillStyle='gray';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    canvas.addEventListener('mousedown',()=>isDrawing=true);
    canvas.addEventListener('mouseup',()=>isDrawing=false);
    canvas.addEventListener('mousemove',scratch);
    canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); isDrawing=true; scratch(e.touches[0]); });
    canvas.addEventListener('touchend',(e)=>{ e.preventDefault(); isDrawing=false; });
    canvas.addEventListener('touchmove',(e)=>{ e.preventDefault(); scratch(e.touches[0]); });
  }

  function scratch(e){
    if(!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();
    ctx.arc(x,y,15,0,Math.PI*2);
    ctx.fill();
    checkPercentage();
  }

  function checkPercentage(){
    const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
    let cleared=0;
    for(let i=3;i<imgData.data.length;i+=4){ if(imgData.data[i]<128) cleared++; }
    if(cleared/imgData.data.length>0.3){ document.getElementById('receiveBtn').style.display='block'; }
  }

  // --- Recibir premio ---
  function receivePrize(){
    document.getElementById('receiveBtn').style.display='none';
    document.getElementById('loader').style.display='block';
    setTimeout(()=>{
      document.getElementById('loader').style.display='none';
      if(Math.random()<0.7){ // 70% chance premio
        showNotification('Depósito confirmado en su cuenta, revise sus fondos, ¡felicidades!');
      } else {
        showNotification('Lo siento, no tuviste suerte 😢');
      }
    },5000);
  }

  // --- Inicialización ---
  window.onload = ()=>{
    if(localStorage.getItem('username')) { nameScreen.classList.remove('active'); walletScreen.classList.add('active'); }
    if(localStorage.getItem('wallet')) { walletScreen.classList.remove('active'); depositScreen.classList.add('active'); }
  };
</script>

</body>
</html>
